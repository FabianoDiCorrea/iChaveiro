name: Build iChaveiro Installer

on:
  push:
    tags:
      - 'v*' # Trigger on version tags

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Electron App
        run: npm run electron:build

      - name: Create Release and Upload
        run: gh release create ${{ github.ref_name }} "release/iChaveiro-Setup-*.exe" "release/latest.yml" --title "${{ github.ref_name }}" --notes "Release ${{ github.ref_name }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
